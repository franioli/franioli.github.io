cv:
  name: Francesco Ioli
  label: Post-doctoral Researcher in Geomatics
  email: francesco.ioli@polimi.it
  location: Milan, Italy
  image: ""
  summary: >
    Post-doctoral researcher in Geomatics at Politecnico di Milano, specialised in photogrammetry and
    geoinformatics for environmental monitoring. My work bridges traditional photogrammetry and modern
    computer vision, with a focus on deep learning for image matching and automated 3D reconstruction
    pipelines, from low-cost terrestrial sensors to satellite multi-view stereo.

  social_networks:
    - network: GitHub
      username: franioli
    - network: LinkedIn
      username: francesco-ioli-640061160
    - network: X
      username: francescoioli

  sections:
    Education:
      - institution: Politecnico di Milano, Dept. of Civil and Environmental Engineering
        location: Milan, Italy
        url: https://www.polimi.it/
        area: Environmental and Infrastructure Engineering (Geomatics)
        studyType: PhD
        start_date: 2021
        end_date: 2024
        score: cum laude
        highlights:
          - "Thesis: Multi-scale and Multi-temporal Photogrammetry for Alpine Glacier Monitoring. Supervisor: prof. L. Pinto; co-supervisor: prof. F. Nex."
          - Developed an image-based system with low-cost stereo cameras for short-term 4D glacier monitoring, including a daily 3D reconstruction pipeline with extreme-wide baselines using deep-learning feature matching.
          - Applied UAV photogrammetry to structural health assessment (automated crack detection on concrete bridges) and cultural heritage documentation.

      - institution: Politecnico di Milano
        location: Milan, Italy
        url: https://www.polimi.it/
        area: Environmental and Land Planning Engineering
        studyType: MSc
        start_date: 2017
        end_date: 2020
        score: 110/110 cum laude
        highlights:
          - Major in Land Monitoring and Diagnostics.
          - "Thesis: Evaluation of Airborne Image Velocimetry approaches with low-cost UAVs in riverine environments (in collaboration with VAW, ETH Zürich)."

      - institution: Politecnico di Milano
        location: Milan, Italy
        url: https://www.polimi.it/
        area: Environmental and Land Planning Engineering
        studyType: BSc
        start_date: 2014
        end_date: 2017
        score: 102/110

    Experience:
      - company: Politecnico di Milano, Dept. of Civil and Environmental Engineering
        position: Post-doctoral Researcher
        location: Milan, Italy
        start_date: 2026-06
        end_date: present
        summary: >
          Working on the MOHYCAM project (Fondazione Cariplo, Territori Sicuri), addressing
          hydrogeological vulnerabilities at the Belvedere Glacier (Monte Rosa) by combining advanced
          glacier-dynamics monitoring with community-based risk-awareness strategies.
        highlights:
          - Multi-temporal photogrammetric monitoring of glacier dynamics and related hydrogeological hazards.
          - Development of automated image-analysis and 3D reconstruction workflows for alpine environments.

      - company: CNR IRPI (Research Institute for Geo-Hydrological Protection)
        position: Post-doctoral Researcher
        location: Turin, Italy
        start_date: 2025-07
        end_date: 2026-06
        summary: >
          Automated low-cost image-analysis workflows for glacier-instability risk management at the
          Planpincieux Glacier (Mont Blanc).
        highlights:
          - Terrestrial stereoscopic time-lapse cameras for kinematics detection, ice-avalanche monitoring and velocity computation via Digital Image Correlation and Structure-from-Motion.
          - Results directly supporting expert decision-making for glacier-instability risk mitigation.
          - Historical aerial photogrammetry for periglacial debris-volume estimation.

      - company: University of Zurich, Dept. of Geography
        position: Post-doctoral Researcher
        location: Zurich, Switzerland
        start_date: 2024-10
        end_date: 2025-06
        summary: >
          Automated pipelines for regional-to-global scale Digital Elevation Model reconstruction from
          satellite multi-view stereo for glacier mass-balance assessment.
        highlights:
          - Contributed to the Glambie-2 Glacier Mass Balance Intercomparison Exercise.
          - Large-scale geospatial processing on Slurm-based HPC clusters.

      - company: University of Twente, ITC
        position: Visiting PhD Student
        location: Enschede, Netherlands
        start_date: 2022-04
        end_date: 2022-07
        summary: Developed a deep-learning wide-baseline stereo matching workflow for 4D alpine glacier monitoring with low-cost time-lapse cameras.

      - company: VAW, ETH Zürich
        position: Visiting Student (MSc Thesis)
        location: Zurich, Switzerland
        start_date: 2019-09
        end_date: 2020-02
        summary: River Engineering group — Particle Image Velocimetry and UAV-based estimation of river-flow discharge from image analysis.

      - company: Politecnico di Milano
        position: Teaching Assistant
        location: Milan, Italy
        start_date: 2020
        end_date: 2024
        summary: Teaching support and independent lecturing for BSc and MSc courses.
        highlights:
          - Photogrammetry and UAV Surveying (MSc), Statistics (BSc), 3D Modelling for Architecture (BSc/MSc), GIS (BSc).
          - Tutor in the Belvedere Glacier summer schools on topographic surveying in mountain environments (2021-2025).

    Projects:
      - name: Deep-Image-Matching
        summary: Core contributor. Toolbox for multi-view image matching combining traditional and deep-learning algorithms for Structure-from-Motion in complex scenarios.
        highlights:
          - "https://github.com/3DOM-FBK/deep-image-matching"

      - name: ICEpy4D
        summary: Lead developer. Open-source Python toolkit for 4D glacier monitoring using deep-learning photogrammetry.
        highlights:
          - "https://github.com/franioli/icepy4d"

      - name: COLMAP-SLAM
        summary: Core contributor. Visual-odometry framework for real-time photogrammetric positioning.
        highlights:
          - "https://github.com/3DOM-FBK/COLMAP_SLAM"

      - name: Belvedere Glacier Open Data & Web-GIS
        summary: Curated long-term open dataset and interactive web platform for glacier documentation and storytelling.
        highlights:
          - "Zenodo DOI: 10.5281/zenodo.10817029"

    Awards:
      - title: MSCA Postdoctoral Fellowship — Seal of Excellence
        date: 2025
        awarder: European Commission
        summary: Awarded for the CryoLens proposal in both the 2024 and 2025 calls (evaluation scores 92.8% and 95.4%).

      - title: Premio Giovani 2023 — Sezione Ricerca
        date: 2023
        awarder: SIFET (Italian Society of Photogrammetry and Topography)
        summary: Young-researcher prize for high-frequency 4D monitoring of alpine glaciers with low-cost time-lapse cameras and deep-learning Structure-from-Motion.

      - title: EGU Higher Education Teaching Grant
        date: 2023
        awarder: European Geosciences Union
        summary: Awarded for open teaching material for the summer school on topographic surveys for territorial monitoring in mountain environments.

      - title: Open Data Day Mini-Grant
        date: 2024
        awarder: Open Knowledge Foundation
        summary: 'For the webinar "Mapping Climate Change in 4D: Belvedere Glacier''s Open Geo Data for Education and Research".'

